name: Git push README
description: Commit and push README.md if it has changes
inputs:
  commit_message:
    description: Commit message for README updates
    required: false
    default: "chore(docs): auto-update README structure"
runs:
  using: composite
  steps:
    - name: Commit and push README
      shell: bash
      run: |
        set -euo pipefail
        if git diff --quiet -- README.md; then
          echo "README has no changes to commit."
          exit 0
        fi

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add README.md
        git commit -m "${{ inputs.commit_message }}"
        git push
