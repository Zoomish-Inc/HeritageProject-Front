name: Setup Node and npm deps
description: Setup Node 20, install npm 11 and dependencies
runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm
    - name: Use npm 11
      shell: bash
      run: npm install -g npm@11
    - name: Install dependencies
      shell: bash
      run: npm ci
