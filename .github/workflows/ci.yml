name: CI

on:
 push:
  branches: [main, master]
 pull_request:

jobs:
 test:
  runs-on: ubuntu-latest
  steps:
   - uses: actions/checkout@v4
     with:
      fetch-depth: 0

   - uses: actions/setup-node@v4
     with:
      node-version: '20'
      cache: npm

   - name: Use npm 11
     run: npm install -g npm@11

   - name: Install dependencies
     run: npm ci

   - name: Run quality gate
     run: npm run check:ci

   - name: Auto-update README on main push
     if: github.event_name == 'push'
     run: |
      CHANGED_FILES="$(git diff --name-only ${{ github.event.before }}...${{ github.sha }})"
      if echo "$CHANGED_FILES" | grep -E '^(src/|tests/|docs/structure.config.json|README\.md)'; then
        npm run docs:update
        if ! git diff --quiet -- README.md; then
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore(docs): auto-update README structure"
          git push
        fi
      else
        echo "No structure-related changes, skipping README auto-update."
      fi

   - name: Verify README structure for PR changes
     if: github.event_name == 'pull_request'
     run: |
      CHANGED_FILES="$(git diff --name-only origin/${{ github.base_ref }}...HEAD)"
      if echo "$CHANGED_FILES" | grep -E '^(src/|tests/|docs/structure.config.json|README\.md)'; then
        npm run docs:update
        git diff --exit-code README.md
      else
        echo "No structure-related changes, skipping README structure update check."
      fi
